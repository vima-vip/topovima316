<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Superadmin</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #0b1220;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: #334155;
      --green: #16a34a;
      --red: #dc2626;
      --blue: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg), #020617);
      color: var(--text);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }
    .btn-green { background: var(--green); }
    .btn-red { background: var(--red); }
    .btn-blue { background: var(--blue); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    th { color: #cbd5e1; }
    .muted { color: var(--muted); }
    .actions-cell { display: flex; gap: 8px; flex-wrap: wrap; }
    form { display: inline; margin: 0; }
    .role { text-transform: capitalize; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card topbar">
      <div>
        <h1>Panel Superadmin</h1>
        <p class="muted">Sesión activa: <strong>{{ usuario }}</strong></p>
      </div>
      <div class="actions">
        <a class="btn btn-green" href="{{ url_for('superadmin_register') }}">Crear usuario</a>
        <a class="btn btn-blue" href="{{ url_for('index') }}">Ir al inicio</a>
        <a class="btn btn-red" href="{{ url_for('logout') }}">Cerrar sesión</a>
      </div>
    </div>

    <div class="card">
      <h2>Usuarios registrados</h2>
      <p class="muted">Aquí puedes ver y eliminar usuarios existentes.</p>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          {% for u in users %}
          <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td class="role">{{ u.role }}</td>
            <td>
              <div class="actions-cell">
                <form method="post" action="{{ url_for('superadmin_delete', user_id=u.id) }}" onsubmit="return confirm('¿Eliminar este usuario?');">
                  <button class="btn btn-red" type="submit" {% if u.username == usuario %}disabled{% endif %}>Eliminar</button>
                </form>
              </div>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
