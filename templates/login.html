<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quiz 3.0</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 28px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 32px;
            color: #1f2937;
        }

        .subtexto {
            margin-top: 0;
            margin-bottom: 20px;
            color: #555;
            line-height: 1.5;
        }

        .error {
            background: #fff1f2;
            color: #b00020;
            border: 1px solid #f3b7c0;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cfd6dd;
            border-radius: 10px;
            font-size: 16px;
            background: #fff;
        }

        input:focus {
            outline: none;
            border-color: #86b7fe;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 13px 16px;
            border: none;
            border-radius: 10px;
            background: #0d6efd;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0b5ed7;
        }

        .pie {
            margin-top: 18px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Quiz 3.0</h1>
        <p class="subtexto">Inicia sesión para acceder a tus cuestionarios.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Entrar</button>
        </form>

        <p class="pie">Acceso restringido a usuarios autorizados.</p>
    </div>
</body>
</html>
