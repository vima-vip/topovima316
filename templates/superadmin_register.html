  .user-box select{
    appearance:none;

  .user-box button{
    padding:12px 14px;

    font-weight:700;
    font-size:15px;
    cursor:pointer;

  }

  .user-box a.btn-link:hover{

    text-align:center;
    flex:1;
  }
</style>
